<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emile's Notes Website</title>
    
    <style>
        #title {
            text-align: center;
            font-size: 400%;
            font-weight: bolder;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            outline: 5px solid rgb(0, 0, 0);
        }

        #header {
            display: flex;
            text-align: center;
        }

        h2 {
            padding-left: 75px;
            color: grey;
        }

        #lines {
            display: block;
            margin: auto;
            background-color: black;
            color: white;
            font-weight: bolder;
            font-size: x-large;
            padding: 5px;
            border: 3px solid rgb(46, 46, 46);
        }

        #lines:hover {
            transform: scale(1.015);
            cursor: pointer;
        }

        #notes {
            margin: auto;
            width: 90%;
            min-height: 65vh;
            font-size: x-large;
            padding: 12px;
            font-family: Arial, Helvetica, sans-serif;
            line-height: 40px;
            background-size: 100% 40px;
            border: 4px solid black;
        }

        @media (max-width: 720px) {
            #title {
                font-size: 280%;
            }

            #notes {
                min-height: 68vh;
            }

            h2 {
                padding-left: 32px;
            }
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded" , function() {
            let notes = document.getElementById("notes");

            notes.innerText = localStorage.getItem("notes");

            notes.addEventListener("input" , function() {
                localStorage.setItem("notes" , notes.innerText);
            });

            let lines_btn = document.getElementById("lines");

            lines_btn.addEventListener("click" , function() {
                if (lines_btn.innerHTML === "Add Lines") {
                    notes.style.backgroundImage = "repeating-linear-gradient(to bottom, white 0px, white 39px, grey 40px, grey 40px)";
                    lines_btn.innerHTML = "Remove lines"
                }
                else {
                    notes.style.backgroundImage = "none"
                    lines_btn.innerHTML = "Add Lines"
                }
            });
            console.log(notes.value)
        });
    </script>
</head>
<body>
    <h1 id="title">NOTES WEBSITE</h1>

    <div id="header">
        <h2>Type Bellow:</h2>
        <button id="lines">Add Lines</button>
    </div>

    <div id="notes" contenteditable="true"></div>
    
</body>
</html>
